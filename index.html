<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISS Display</title>
  <link rel="stylesheet" href="styles.v10.css">
  <link rel="icon" href="https://raw.githubusercontent.com/wes-s/ISSDisplay/main/Images/favicon.ico">
</head>
<body>
  <main class="page">
    <pre id="title" class="title"></pre>
    <canvas id="display" width="1000" height="550"></canvas>
    <pre id="error" class="error"></pre>

    <form id="controls" class="controls">
      <label>Satellite IDs
        <input id="satellites" name="satellites" type="text" placeholder="20580,39084">
      </label>
      <button type="submit">Render</button>
    </form>
  </main>
  <script src="app.v10.js"></script>
</body>
</html>
